name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Install Task
        run: brew install go-task/tap/go-task

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: task build-dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: BrowserSchedule.dmg
          path: .build/pkg/BrowserSchedule.dmg

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Get Latest Release
        id: latest
        run: |
          LATEST=$(gh release view --json tagName -q '.tagName' 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Check Version Bump
        id: check
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          if printf '%s\n%s' "$LATEST" "$CURRENT" | sort -V | tail -1 | grep -qx "$CURRENT" && [ "$CURRENT" != "$LATEST" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DMG
        if: steps.check.outputs.should_release == 'true'
        uses: actions/download-artifact@v4
        with:
          name: BrowserSchedule.dmg
          path: .build/pkg

      - name: Create Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ./.build/pkg/BrowserSchedule.dmg
          body: |
            ## BrowserSchedule v${{ steps.version.outputs.version }}

            Automatic browser switching based on time, day, and URL patterns.

            ### Install via Homebrew (Recommended)
            ```sh
            brew install radiosilence/browser-schedule/browser-schedule
            ```

            ### Install Manually
            1. Download `BrowserSchedule.dmg` below
            2. Mount the DMG and drag BrowserSchedule.app to Applications
            3. Remove quarantine: `xattr -cr /Applications/BrowserSchedule.app`
            4. **Double-click the app** to open settings and set as default browser

            ### Changes
            See commit history for detailed changes.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Update Cask
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 .build/pkg/BrowserSchedule.dmg | awk '{print $1}')
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/browser-schedule.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/browser-schedule.rb

      - name: Commit Cask Update
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/browser-schedule.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore: update cask to v${VERSION} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
