name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.1"

      - name: Install Task
        run: brew install go-task/tap/go-task

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: task build-dmg

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: BrowserSchedule.dmg
          path: .build/pkg/BrowserSchedule.dmg

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Get Latest Release
        id: latest
        run: |
          LATEST=$(gh release view --json tagName -q '.tagName' 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Check Version Bump
        id: check
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          if printf '%s\n%s' "$LATEST" "$CURRENT" | sort -V | tail -1 | grep -qx "$CURRENT" && [ "$CURRENT" != "$LATEST" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DMG
        if: steps.check.outputs.should_release == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: BrowserSchedule.dmg
          path: .build/pkg

      - name: Create Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ./.build/pkg/BrowserSchedule.dmg
          body: |
            ## BrowserSchedule v${{ steps.version.outputs.version }}

            Automatic browser switching based on time, day, and URL patterns.

            ### Install via Homebrew (Recommended)
            ```sh
            brew install --cask radiosilence/browser-schedule/browser-schedule
            ```

            ### Install Manually
            1. Download `BrowserSchedule.dmg` below
            2. Mount the DMG and drag BrowserSchedule.app to Applications
            3. Remove quarantine: `xattr -cr /Applications/BrowserSchedule.app`
            4. **Double-click the app** to open settings and set as default browser

            ### Changes
            See commit history for detailed changes.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Update Homebrew Tap
        if: steps.check.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA256=$(shasum -a 256 .build/pkg/BrowserSchedule.dmg | awk '{print $1}')

          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/radiosilence/homebrew-browser-schedule.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Casks

          printf 'cask "browser-schedule" do\n' > Casks/browser-schedule.rb
          printf '  version "%s"\n' "${RELEASE_VERSION}" >> Casks/browser-schedule.rb
          printf '  sha256 "%s"\n' "${SHA256}" >> Casks/browser-schedule.rb
          printf '\n' >> Casks/browser-schedule.rb
          printf '  url "https://github.com/radiosilence/browser-schedule/releases/download/v#{version}/BrowserSchedule.dmg"\n' >> Casks/browser-schedule.rb
          printf '  name "BrowserSchedule"\n' >> Casks/browser-schedule.rb
          printf '  desc "Automatic browser switching based on time, day, and URL patterns"\n' >> Casks/browser-schedule.rb
          printf '  homepage "https://github.com/radiosilence/browser-schedule"\n' >> Casks/browser-schedule.rb
          printf '\n' >> Casks/browser-schedule.rb
          printf '  depends_on macos: ">= :sonoma"\n' >> Casks/browser-schedule.rb
          printf '\n' >> Casks/browser-schedule.rb
          printf '  app "BrowserSchedule.app"\n' >> Casks/browser-schedule.rb
          printf '\n' >> Casks/browser-schedule.rb
          printf '  postflight do\n' >> Casks/browser-schedule.rb
          printf '    system_command "/usr/bin/xattr",\n' >> Casks/browser-schedule.rb
          printf '                   args: ["-cr", "#{appdir}/BrowserSchedule.app"]\n' >> Casks/browser-schedule.rb
          printf '  end\n' >> Casks/browser-schedule.rb
          printf '\n' >> Casks/browser-schedule.rb
          printf '  zap trash: [\n' >> Casks/browser-schedule.rb
          printf '    "~/.config/browser-schedule",\n' >> Casks/browser-schedule.rb
          printf '  ]\n' >> Casks/browser-schedule.rb
          printf 'end\n' >> Casks/browser-schedule.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Update browser-schedule to v${RELEASE_VERSION}"
          git push
